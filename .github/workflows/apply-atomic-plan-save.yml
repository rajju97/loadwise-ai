name: Apply atomic plan save

on:
  push:
    branches:
      - fix/systematic-bug-sweep
    paths:
      - '.github/workflows/apply-atomic-plan-save.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/systematic-bug-sweep
          fetch-depth: 0
      - name: Update client and bootstrap schema
        shell: python
        run: |
          from pathlib import Path

          data_path = Path('src/lib/data.ts')
          text = data_path.read_text()
          old = '''export async function saveLoadPlan(vehicle: Vehicle, items: LoadItem[], result: OptimizationResult, objective: OptimizationObjective = 'balanced_utilization', name?: string): Promise<SavedPlan> {
            const client = requireClient()
            const [organizationId, userId] = await Promise.all([getCurrentOrganizationId(), requireUserId()])
            const referenceCode = `LW-${new Date().toISOString().slice(2, 10).replace(/-/g, '')}-${Math.floor(100 + Math.random() * 900)}`
            const inputData = { vehicle, items, objective }
            const vehicleId = vehicle.id && /^[0-9a-f-]{36}$/i.test(vehicle.id) ? vehicle.id : null
            const { data: job, error: jobError } = await client.from('optimization_jobs').insert({
              organization_id: organizationId,
              vehicle_id: vehicleId,
              status: 'completed',
              objective,
              input_data: inputData,
              result_data: result,
              runtime_ms: result.runtime_ms,
              created_by: userId,
            }).select('id').single()
            if (jobError) throw jobError

            const planData = { vehicle, items, objective, result }
            const { data, error } = await client.from('load_plans').insert({
              organization_id: organizationId,
              optimization_job_id: job.id,
              name: name?.trim() || `${vehicle.name} load plan`,
              reference_code: referenceCode,
              plan_data: planData,
              created_by: userId,
            }).select('*').single()
            if (error) throw error
            return data as SavedPlan
          }'''
          new = '''export async function saveLoadPlan(vehicle: Vehicle, items: LoadItem[], result: OptimizationResult, objective: OptimizationObjective = 'balanced_utilization', name?: string): Promise<SavedPlan> {
            const client = requireClient()
            const organizationId = await getCurrentOrganizationId()
            const referenceCode = `LW-${new Date().toISOString().slice(2, 10).replace(/-/g, '')}-${Math.floor(100 + Math.random() * 900)}`
            const inputData = { vehicle, items, objective }
            const planData = { vehicle, items, objective, result }
            const vehicleId = vehicle.id && /^[0-9a-f-]{36}$/i.test(vehicle.id) ? vehicle.id : null
            const { data, error } = await client.rpc('save_load_plan', {
              p_organization_id: organizationId,
              p_vehicle_id: vehicleId,
              p_objective: objective,
              p_input_data: inputData,
              p_result_data: result,
              p_runtime_ms: result.runtime_ms,
              p_name: name?.trim() || `${vehicle.name} load plan`,
              p_reference_code: referenceCode,
              p_plan_data: planData,
            })
            if (error) throw error
            const savedPlan = Array.isArray(data) ? data[0] : data
            if (!savedPlan || typeof savedPlan !== 'object') throw new Error('The saved plan response was invalid')
            return savedPlan as SavedPlan
          }'''

          if text.count(old) != 1:
              raise SystemExit(f'Expected one saveLoadPlan block, found {text.count(old)}')
          data_path.write_text(text.replace(old, new, 1))

          schema_path = Path('supabase/schema.sql')
          schema = schema_path.read_text()
          marker = '-- Enforce workspace role boundaries and save optimization jobs/plans atomically.'
          migration = Path('supabase/migrations/20260721_harden_roles_and_atomic_plan_save.sql').read_text().strip()
          if marker not in schema:
              schema_path.write_text(schema.rstrip() + '\n\n' + migration + '\n')
      - name: Commit atomic save integration
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply-atomic-plan-save.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use atomic workspace plan persistence"
          git push origin HEAD:fix/systematic-bug-sweep
