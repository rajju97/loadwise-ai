name: Apply verified optimizer patch

on:
  push:
    branches:
      - fix/systematic-bug-sweep
    paths:
      - '.bugfix/**'
      - '.github/workflows/apply-bugfix-payload.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/systematic-bug-sweep
          fetch-depth: 0
      - name: Decode and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .bugfix/optimizer.b64.part-* | base64 --decode > backend/app/optimizer.py
          base64 --decode .bugfix/test_optimizer.b64 > backend/tests/test_optimizer.py
          test "$(git hash-object backend/app/optimizer.py)" = "c23188095c4ec51a1df6bd853cd6a40346e8da44"
          test "$(git hash-object backend/tests/test_optimizer.py)" = "6dde4f1b0f339abbb8369f4762a11bc5890a4285"
      - name: Commit verified sources
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bugfix .github/workflows/apply-bugfix-payload.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix optimizer objective and stability correctness"
          git push origin HEAD:fix/systematic-bug-sweep
