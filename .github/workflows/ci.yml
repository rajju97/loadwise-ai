name: CI
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: pip install -r requirements-dev.txt
      - run: npm run test:optimizer
